<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro Live Scheduler</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-start: #1b2a18;
      --bg-end:   #22321f;
      --accent:   #8fc93a;
      --text:     #dcedc2;
      --muted:    #bbbbbb;
      --transition: 0.3s ease;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(120deg, var(--bg-start), var(--bg-end));
      background-size: 200% 200%;
      animation: gradientShift 240s var(--transition) infinite;
      position: relative;
      transition: background var(--transition);
    }
    @keyframes gradientShift { 0%,100% { background-position:0% 0%; } 50% { background-position:100% 100%; } }
    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: repeating-linear-gradient(45deg,
        rgba(255,255,255,0.05) 0,
        rgba(255,255,255,0.05) 3px,
        transparent 3px,
        transparent 15px
      );
      background-size:20px 20px;
      animation:stripesMove 14400s linear infinite;
      pointer-events:none;
      z-index:0;
    }
    @keyframes stripesMove { to { background-position:-5000px 5000px; } }
    #controls {
      position:absolute;
      top:16px; right:16px; z-index:2;
      display:flex; gap:8px;
    }
    .top-btn {
      background:rgba(0,0,0,0.5);
      border:none;
      color:var(--text);
      padding:8px 10px;
      border-radius:6px;
      cursor:pointer;
      font-size:14px;
      transition:background var(--transition);
    }
    .top-btn:hover { background:rgba(0,0,0,0.7); }
    #container {
      position:relative; z-index:1;
      width:380px; max-width:90%;
      padding:2rem 1.5rem;
      background:rgba(0,0,0,0.35);
      border-radius:16px;
      text-align:center;
      box-shadow:0 12px 24px rgba(0,0,0,0.5);
      transition:color var(--transition);
    }
    h1 {
      font-size:2.4rem;
      margin-bottom:0.5rem;
      text-transform:uppercase;
      color:var(--text);
    }
    #timer {
      font-size:4rem;
      font-weight:600;
      margin:0.5rem 0 1rem;
      color:var(--text);
    }
    #next-info {
      display:flex;
      flex-direction:column;
      align-items:center;
      margin-bottom:1rem;
      color:var(--text);
    }
    .next-label {
      font-size:0.75rem;
      color:var(--muted);
      letter-spacing:1.5px;
      margin-bottom:0.25rem;
    }
    .next-content {
      display:flex;
      align-items:center;
    }
    .morph-dot {
      width:16px; height:16px;
      margin-right:8px;
      border-radius:50%;
      background:radial-gradient(circle at center, var(--accent) 0%, transparent 70%);
      box-shadow:0 0 8px var(--accent);
      animation:morph var(--morph-duration,6s) ease-in-out infinite;
      transform-origin:center;
    }
    @keyframes morph { 0%,100% { transform:scale(1) rotate(0deg);} 25% { transform:scale(1.1) rotate(20deg);} 50% { transform:scale(0.9) rotate(-20deg);} 75% { transform:scale(1.05) rotate(10deg);} }
    #progressBar {
      width:100%; height:8px;
      background:rgba(255,255,255,0.2);
      border-radius:4px;
      overflow:hidden;
      margin-top:1rem;
    }
    #progress {
      width:0; height:100%;
      background:var(--accent);
      transition:width 1s linear;
    }
    .fade-in { animation:fadeIn 0.5s ease-out; }
    @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
  </style>
</head>
<body>
  <div id="controls">
    <button id="sound-btn" class="top-btn" aria-label="Toggle Sound">🔔 Sound: Off</button>
    <button id="fullscreen-btn" class="top-btn" aria-label="Toggle Fullscreen">⛶ Fullscreen</button>
  </div>

  <!-- Small built-in chime. Replace `src` with your own bell.mp3 if you prefer. -->
  <audio id="bell" preload="auto"
    src="data:audio/wav;base64,UklGRlQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABYAZGF0YQwAAACAgICAf39/f4+Pj46Ojo2NjYyMjIxMTExHR0dHBwcGBgYFRUVFBQUExMTDQ0NCwsKCQkJCAgICQkJDAwMDQ0NERERExMTFhYWFxcX"></audio>

  <div id="container">
    <h1 id="state-label">--</h1>
    <div id="timer">--:--</div>
    <div id="next-info">
      <div class="next-label">NEXT</div>
      <div class="next-content"><span class="morph-dot"></span><span id="next-text">--</span></div>
    </div>
    <div id="progressBar"><div id="progress"></div></div>
  </div>

  <script>
    (function() {
      const schedule = {
        Monday: [

        ],

          { start: '1:00 PM',  end: '1:30 PM',  name: 'Expertise Building'  },
          { start: '1:30 PM',  end: '1:40 PM',  name: 'Break'       },
          { start: '1:40 PM',  end: '2:40 PM',  name: 'Audience Building'  },
          { start: '2:40 PM',  end: '2:50 PM',  name: 'Break'       },
          { start: '2:50 PM',  end: '3:50 PM',  name: 'Product / AI Skill Building'  },
          { start: '3:50 PM',  end: '4:00 PM',  name: 'Clean Up'       },
          { start: '4:00 PM',  end: '11:59 PM', name: 'Free Time'   }
        ],
        Wednesday: [
          { start: '8:45 AM',  end: '9:12 AM',  name: 'Pomodoro 1' },
          { start: '9:12 AM',  end: '9:18 AM',  name: 'Break'        },
          { start: '9:18 AM',  end: '9:45 AM',  name: 'Pomodoro 2' },
          { start: '9:45 AM',  end: '9:51 AM',  name: 'Break'        },

          { start: '10:18 AM', end: '10:28 AM', name: 'Long Break'   },
          { start: '10:28 AM', end: '10:55 AM', name: 'Pomodoro 4' },
          { start: '10:55 AM', end: '11:01 AM', name: 'Break'        },

          { start: '1:30 PM',  end: '1:40 PM',  name: 'Break'       },

          { start: '2:50 PM',  end: '3:50 PM',  name: 'Expertise Debate'  },
          { start: '3:50 PM',  end: '4:00 PM',  name: 'Clean Up'       },
          { start: '4:00 PM',  end: '11:59 PM', name: 'Free Time'   }
        ],
        Thursday: [
          { start: '8:45 AM',  end: '9:12 AM',  name: 'Pomodoro 1' },
          { start: '9:12 AM',  end: '9:18 AM',  name: 'Break'        },
          { start: '9:18 AM',  end: '9:45 AM',  name: 'Pomodoro 2' },

          { start: '10:55 AM', end: '11:01 AM', name: 'Break'        },

          { start: '11:28 AM', end: '11:34 AM', name: 'Break'        },

          { start: '2:50 PM',  end: '3:50 PM',  name: 'Product / AI Skill Building'  },
          { start: '3:50 PM',  end: '4:00 PM',  name: 'Clean Up'       },
          { start: '4:00 PM',  end: '11:59 PM', name: 'Free Time'   }
        ],
        Friday: [
          { start: '8:45 AM',  end: '9:12 AM',  name: 'Pomodoro 1' },
          { start: '9:12 AM',  end: '9:18 AM',  name: 'Break'        },
          { start: '9:18 AM',  end: '9:45 AM',  name: 'Pomodoro 2' },
          { start: '9:45 AM',  end: '9:51 AM',  name: 'Break'        },
          { start: '9:51 AM',  end: '10:18 AM', name: 'Pomodoro 3' },
          { start: '10:18 AM', end: '10:28 AM', name: 'Long Break'   },
          { start: '10:28 AM', end: '10:55 AM', name: 'Pomodoro 4' },
          { start: '10:55 AM', end: '11:01 AM', name: 'Break'        },
          { start: '11:01 AM', end: '11:28 AM', name: 'Pomodoro 5' },
          { start: '11:28 AM', end: '11:34 AM', name: 'Break'        },
          { start: '11:34 AM', end: '12:00 PM', name: 'Pomodoro 6' },
          { start: '12:00 PM', end: '12:45 PM', name: 'Lunch'        },
          { start: '12:45 PM', end: '1:00 PM',  name: 'Goal Setting'  },
          { start: '1:00 PM',  end: '1:30 PM',  name: 'Expertise Building'  },
          { start: '1:30 PM',  end: '1:40 PM',  name: 'Break'       },
          { start: '1:40 PM',  end: '2:40 PM',  name: 'Audience Building'  },
          { start: '2:40 PM',  end: '2:50 PM',  name: 'Break'       },
          { start: '2:50 PM',  end: '3:50 PM',  name: 'Accountability Presentations'  },
          { start: '3:50 PM',  end: '4:00 PM',  name: 'Clean Up'       },
          { start: '4:00 PM',  end: '11:59 PM', name: 'Free Time'   }
        ]
      };

      function parseTime(str) {
        const [time, period] = str.split(' ');
        let [h, m] = time.split(':').map(Number);
        if (period === 'PM' && h < 12) h += 12;
        if (period === 'AM' && h === 12) h = 0;
        return { hour: h, minute: m };
      }

      // Uses America/New_York as you had it (function name kept for backwards-compat)
      function getCST() {
        return new Date(new Date().toLocaleString('en-US', { timeZone: 'America/New_York' }));
      }

      const dot = document.querySelector('.morph-dot');
      const stateLabel = document.getElementById('state-label');
      const timerEl = document.getElementById('timer');
      const nextText = document.getElementById('next-text');
      const progressEl = document.getElementById('progress');
      const root = document.documentElement;

      // 🔔 Sound controls
      const bell = document.getElementById('bell');
      const soundBtn = document.getElementById('sound-btn');
      let muted = JSON.parse(localStorage.getItem('bellMuted') || 'true'); // start muted
      updateSoundUI();

      soundBtn.addEventListener('click', async () => {
        muted = !muted;
        localStorage.setItem('bellMuted', JSON.stringify(muted));
        updateSoundUI();
        if (!muted) {
          // Unlock audio on first interaction per autoplay policies
          try {
            await bell.play();
            bell.pause(); bell.currentTime = 0;
          } catch (e) { /* ignore */ }
        }
      });

      function updateSoundUI() {
        soundBtn.textContent = (muted ? '🔕 Sound: Off' : '🔔 Sound: On');
        soundBtn.setAttribute('aria-pressed', String(!muted));
      }

      document.getElementById('fullscreen-btn').addEventListener('click', () => {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
      });

      function setMorph() {
        const duration = (Math.random() * 4 + 5).toFixed(2) + 's';
        dot.style.setProperty('--morph-duration', duration);
      }

      function getBlocksForDay(date) {
        const dayName = date.toLocaleString('en-US', { weekday: 'long' });
        const raw = schedule[dayName] || [];
        return raw.map(b => {
          const sd = parseTime(b.start);
          const ed = parseTime(b.end);
          const start = new Date(date.getFullYear(), date.getMonth(), date.getDate(), sd.hour, sd.minute);
          let end = new Date(start);
          end.setHours(ed.hour, ed.minute);
          if (end <= start) end.setDate(end.getDate() + 1);
          return { name: b.name, start, end };
        });
      }

      // 🔔 Track transitions to ring right when the block changes
      let lastBlockName = null;

      function ring() {
        if (muted) return;
        bell.currentTime = 0;
        bell.play().catch(() => {});
      }

      function update() {
        const now = getCST();
        const blocks = getBlocksForDay(now);
        const current = blocks.find(b => now >= b.start && now < b.end) || null;
        let next;
        if (current) {
          next = blocks[(blocks.indexOf(current) + 1) % blocks.length];
        } else {
          next = blocks.find(b => b.start > now) || blocks[0];
        }

        const currentName = current ? current.name : 'Starting In';

        // 🔔 Detect transition
        if (lastBlockName !== null && currentName !== lastBlockName) {
          ring();
        }
        lastBlockName = currentName;

        stateLabel.textContent = currentName;
        nextText.textContent = next ? next.name : '--';

        // Theme based strictly on current block name
        let name = current ? current.name : '';
        let bgStart = '#1b2a18';
        let bgEnd = '#22321f';
        let accent = '#8fc93a';
        if (name === 'Lunch') {
          bgStart = '#006666'; bgEnd = '#009999'; accent = '#00ffe0';
        } else if (name === 'Break') {
          bgStart = '#ff6666'; bgEnd = '#ff9999'; accent = '#ff0066';
        } else if (name === 'Long Break') {
          bgStart = '#ff6666'; bgEnd = '#ff9999'; accent = '#ff0066';
        }
        root.style.setProperty('--bg-start', bgStart);
        root.style.setProperty('--bg-end', bgEnd);
        root.style.setProperty('--accent', accent);
        document.body.style.background = `linear-gradient(120deg, ${bgStart}, ${bgEnd})`;

        // Countdown
        const targetTime = (current ? current.end : next.start).getTime();
        let diff = Math.max(0, targetTime - now.getTime());
        const m = Math.floor(diff / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        timerEl.textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;

        // Progress bar
        if (current) {
          const total = current.end.getTime() - current.start.getTime();
          const elapsed = now.getTime() - current.start.getTime();
          progressEl.style.width = `${(elapsed / total) * 100}%`;
        } else {
          progressEl.style.width = '0%';
        }

        // Fade animation
        [stateLabel, timerEl, nextText, progressEl].forEach(el => {
          el.classList.add('fade-in');
          el.addEventListener('animationend', () => el.classList.remove('fade-in'), { once: true });
        });

        setMorph();
        requestAnimationFrame(update);
      }

      setMorph();
      update();
    })();
  </script>

</html>
